# Automatically publish all public packages to NPM on every push to the
# release branch. Uses a dev pre-release suffix so each push gets a unique
# version (e.g. 10.0.0-rc.1-dev.1774300000.abc1234) tagged as `latest`.
#
# To switch the release branch: change the branches list below.
# To disable publishing:
#   * Recommended: disable the workflow from the Actions UI
#     (Actions tab → Continuous NPM Publish → … → Disable workflow).
#     This stops the push trigger entirely without any code change.
#   * Alternative: delete the `npm-publish` GitHub Environment in
#     repo Settings → Environments. The `verify-environment` job
#     fails-closed when the environment is missing, so the publish
#     step never runs and NPM_TOKEN is never injected into a runner.
#
# What does NOT disable publishing anymore: removing the NPM_TOKEN
# repo-level secret. After the hardening landed in this PR, NPM_TOKEN
# should live INSIDE the `npm-publish` Environment, where it is
# invisible to any job that does not declare `environment: npm-publish`.
# This is the structural property that makes the gate fail-closed.

name: Continuous NPM Publish

on:
  push:
    branches: [main]  # ← change this when the release branch moves

permissions:
  contents: read

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  # PREFLIGHT — runs WITHOUT `environment: npm-publish`, so NPM_TOKEN is
  # NOT in scope here. This is the critical structural fix: GitHub
  # resolves `environment:` (and injects its secrets) BEFORE the first
  # step of a job runs, so a verification step that lives inside the
  # publish job cannot prevent NPM_TOKEN exposure if the environment is
  # missing/unprotected — by the time step 1 logs `Run …`, the secret
  # is already in the runner's env. The verify job below proves the
  # environment is configured correctly; the publish job below `needs:`
  # it and is the ONLY job in this workflow that gates on
  # `environment: npm-publish`.
  #
  # NOTE on the disable mechanism: an earlier revision of this workflow
  # tried to gate verify+publish on `secrets.NPM_TOKEN != ''` via a
  # `check-token` preflight job. That breaks once NPM_TOKEN moves from
  # a repo-level secret to an environment-level secret on `npm-publish`
  # (which is the hardening recommendation in
  # docs/security/SUPPLY_CHAIN_HARDENING.md §C step 4) — environment
  # secrets are ONLY visible to jobs that declare `environment: <name>`,
  # so the preflight always saw an empty token and skipped both jobs
  # permanently. The structurally correct disable mechanisms are
  # documented in the file header above.
  verify-environment:
    name: Verify npm-publish environment has required reviewers
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: "!startsWith(github.event.head_commit.message, 'chore: continuous publish')"
    permissions:
      contents: read
      # `actions: read` is the documented minimum scope for reading
      # environment configuration via the REST API
      # (`GET /repos/{owner}/{repo}/environments/{name}`). Without it
      # the `gh api` call below 403s even on a correctly-configured
      # environment, which would block every publish — exactly the
      # false-positive the previous reviewer flagged.
      actions: read
    steps:
      - name: Verify npm-publish environment
        # GitHub Actions does NOT fail-closed on an unconfigured environment:
        # referencing `environment: npm-publish` against a missing env block
        # silently auto-creates it with no protection rules. This step
        # queries the environment via the API and refuses to proceed if
        # no `required_reviewers` rule is configured. The publish job
        # below `needs:` this job, so a failure here prevents NPM_TOKEN
        # from ever being injected into a runner. See
        # docs/security/SUPPLY_CHAIN_HARDENING.md §C for the maintainer
        # setup runbook this depends on.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! ENV_CONFIG=$(gh api "repos/${GH_REPO}/environments/npm-publish" 2>&1); then
            echo "::error title=npm-publish environment missing::Configure the npm-publish Environment with required reviewers + a wait timer before this workflow can publish. See docs/security/SUPPLY_CHAIN_HARDENING.md §C."
            echo "API response: ${ENV_CONFIG}"
            exit 1
          fi

          REVIEWER_COUNT=$(echo "${ENV_CONFIG}" \
            | jq '[.protection_rules[]? | select(.type == "required_reviewers") | .reviewers // []] | flatten | length' \
            || echo 0)
          if [ "${REVIEWER_COUNT:-0}" -lt 1 ]; then
            echo "::error title=npm-publish environment unprotected::Environment exists but has zero required reviewers. NPM_TOKEN would publish without human review. Add at least one required reviewer in repo Settings → Environments → npm-publish."
            exit 1
          fi

          # prevent_self_review on the required_reviewers rule. Without
          # this, the same maintainer who merged a malicious change can
          # approve `npm-publish` themselves and immediately unlock
          # NPM_TOKEN, which defeats the separation-of-duties control
          # this preflight is supposed to enforce. The GitHub API exposes
          # this as `.prevent_self_review` on the `required_reviewers`
          # protection rule. We fail-closed unless it's explicitly true.
          PREVENT_SELF_REVIEW=$(echo "${ENV_CONFIG}" \
            | jq -r '[.protection_rules[]? | select(.type == "required_reviewers") | .prevent_self_review] | first // false' \
            || echo false)
          if [ "${PREVENT_SELF_REVIEW}" != "true" ]; then
            echo "::error title=npm-publish self-review not blocked::Environment has reviewers but \`prevent_self_review\` is disabled. The maintainer who merged the change can approve their own npm-publish gate and unlock NPM_TOKEN, defeating the separation-of-duties control. Enable 'Prevent self-review' under the required-reviewers rule in repo Settings → Environments → npm-publish."
            exit 1
          fi

          # wait_timer protection rule. The hardening doc + the error message
          # above both say a wait timer is mandatory, so enforce it here:
          # without one, a reviewer who clicks "Approve" by mistake has no
          # window to abort before NPM_TOKEN flows to the runner. Any
          # wait_timer > 0 satisfies the gate; 5 minutes is the documented
          # recommended minimum.
          WAIT_TIMER=$(echo "${ENV_CONFIG}" \
            | jq -r '[.protection_rules[]? | select(.type == "wait_timer") | .wait_timer] | first // 0' \
            || echo 0)
          if [ "${WAIT_TIMER:-0}" -lt 1 ]; then
            echo "::error title=npm-publish wait_timer missing::Environment has reviewers but no wait_timer protection rule. A reviewer who clicks 'Approve' by mistake would let NPM_TOKEN flow with no recourse. Add a wait_timer (5 minutes recommended) in repo Settings → Environments → npm-publish."
            exit 1
          fi

          echo "✓ npm-publish environment configured with ${REVIEWER_COUNT} required reviewer(s) (self-review blocked) + ${WAIT_TIMER}-min wait timer"

  publish:
    name: Build & Publish to NPM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # `needs:` ensures the publish job DOES NOT START until
    # verify-environment confirms the npm-publish environment is
    # configured with required reviewers. Combined with `environment:`
    # below, this is what makes the gate fail-closed: NPM_TOKEN is only
    # injected into a runner whose preflight already proved the
    # environment is configured. The `if:` mirrors verify-environment's
    # guard so a manual rerun of just one job stays consistent.
    needs: verify-environment
    if: "!startsWith(github.event.head_commit.message, 'chore: continuous publish')"
    # `npm-publish` Environment gates access to NPM_TOKEN. Configure required
    # reviewers + a wait timer in repo Settings → Environments → `npm-publish`
    # so a compromised merge to main cannot auto-publish without human
    # approval. See docs/security/SUPPLY_CHAIN_HARDENING.md for the exact
    # setup steps. The environment value MUST match the Environment name
    # configured in repo Settings.
    environment: npm-publish

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate npm metadata points to v10
        run: pnpm check:npm-metadata

      - name: Build all packages and Node UI bundle
        run: pnpm build

      # NOTE: tests are intentionally NOT re-run here. The main `ci.yml`
      # workflow runs the full TORNADO / BURA / KOSAVA matrix in parallel on
      # the same commit and is the authoritative test gate (enforced via
      # branch protection on merges to v10-rc). Re-running `pnpm turbo test`
      # in this publish workflow was redundant with `ci.yml` AND incompatible
      # with the `accept-red-ci` policy on v10-rc: a deliberately-red
      # PROD-BUG sentinel test (e.g. network-sim K-4/K-5 — no seeded RNG, no
      # libp2p-parity harness) would fail this step and block every dev
      # pre-release, even though CI was already reporting the same red state
      # as documented bug evidence. See .test-audit/BUGS_FOUND.md.

      - name: Compute dev version suffix
        id: version
        run: |
          EPOCH=$(date +%s)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "SUFFIX=dev.${EPOCH}.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Bump all public packages to dev pre-release
        env:
          SUFFIX: ${{ steps.version.outputs.SUFFIX }}
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const pkgsDir = path.join(process.cwd(), 'packages');
            for (const dir of fs.readdirSync(pkgsDir)) {
              const pkgPath = path.join(pkgsDir, dir, 'package.json');
              if (!fs.existsSync(pkgPath)) continue;
              const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf-8'));
              if (pkg.private) continue;
              const base = pkg.version.replace(/-dev\\..*$/, '');
              pkg.version = base + '-' + '${SUFFIX}';
              fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
              console.log(pkg.name + '@' + pkg.version);
            }
          "

      - name: Publish all public packages
        # NPM_TOKEN is an environment-level secret on `npm-publish`. It
        # is ONLY visible to this job (which declares `environment:
        # npm-publish` above) — no other job in this workflow can read
        # it. If NPM_TOKEN is missing from the environment, `pnpm
        # publish` fails with an npm auth error (which is correct
        # behaviour: the maintainer either misconfigured the env or
        # intends to disable publishing, both of which the file-header
        # disable-mechanism docs cover).
        run: pnpm -r publish --no-git-checks --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
