# Publish all public packages to NPM when a semver version tag is pushed.
# Only fires on tags matching `v<digit>*.<digit>*.<digit>*` (e.g. `v10.0.0`,
# `v10.0.0-rc.8`). Tags like `vnext` or `v-test` are ignored.
# Full semver validation happens in the build-and-pack job.
# Merges to main do NOT trigger a publish — only explicit releases do.
#
# The npm dist-tag is derived from the version string:
#   * `-rc.*`    → `--tag rc`     (release candidates)
#   * `-beta.*`  → `--tag beta`
#   * `-alpha.*` → `--tag alpha`
#   * otherwise  → `--tag latest` (stable releases)
#
# To disable publishing:
#   * Recommended: disable the workflow from the Actions UI
#     (Actions tab → NPM Publish → … → Disable workflow).
#   * Alternative: delete the `npm-publish` GitHub Environment in
#     repo Settings → Environments. The `verify-environment` job
#     fails-closed when the environment is missing, so the publish
#     step never runs and NPM_TOKEN is never injected into a runner.
#
# What does NOT disable publishing: removing the NPM_TOKEN
# repo-level secret. NPM_TOKEN lives INSIDE the `npm-publish`
# Environment, invisible to any job that does not declare
# `environment: npm-publish`.
#
# JOB GRAPH (the critical design property):
#
#   verify-environment      no env, no secret
#         ↓
#   build-and-pack          no env, no secret — runs build + lifecycle
#         ↓                 scripts, packs tarballs, uploads artifact
#   publish                 environment: npm-publish, NPM_TOKEN in scope,
#                           id-token: write for --provenance; runs
#                           `npm publish <tarball> --ignore-scripts`
#                           ONLY, no install/build/test happens with
#                           the secret in scope.
#
# This separation is what closes the largest remaining design gap
# called out in the security review: secret-bearing jobs no longer
# execute repository or package code, so a compromised lifecycle hook
# in a transitively-installed dep cannot exfiltrate NPM_TOKEN.

name: NPM Publish

on:
  push:
    tags: ['v[0-9]*.[0-9]*.[0-9]*']

permissions:
  contents: read

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  # PREFLIGHT — runs WITHOUT `environment: npm-publish`, so NPM_TOKEN is
  # NOT in scope here. This is the critical structural fix: GitHub
  # resolves `environment:` (and injects its secrets) BEFORE the first
  # step of a job runs, so a verification step that lives inside the
  # publish job cannot prevent NPM_TOKEN exposure if the environment is
  # missing/unprotected — by the time step 1 logs `Run …`, the secret
  # is already in the runner's env. The verify job below proves the
  # environment is configured correctly; the publish job below `needs:`
  # it and is the ONLY job in this workflow that gates on
  # `environment: npm-publish`.
  #
  # NOTE on the disable mechanism: an earlier revision of this workflow
  # tried to gate verify+publish on `secrets.NPM_TOKEN != ''` via a
  # `check-token` preflight job. That breaks once NPM_TOKEN moves from
  # a repo-level secret to an environment-level secret on `npm-publish`
  # (which is the hardening recommendation in
  # docs/security/SUPPLY_CHAIN_HARDENING.md §C step 4) — environment
  # secrets are ONLY visible to jobs that declare `environment: <name>`,
  # so the preflight always saw an empty token and skipped both jobs
  # permanently. The structurally correct disable mechanisms are
  # documented in the file header above.
  verify-environment:
    name: Verify npm-publish environment protection rules
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      # `actions: read` is the documented minimum scope for reading
      # environment configuration via the REST API
      # (`GET /repos/{owner}/{repo}/environments/{name}`). Without it
      # the `gh api` call below 403s even on a correctly-configured
      # environment, which would block every publish — exactly the
      # false-positive the previous reviewer flagged.
      actions: read
    steps:
      - name: Verify npm-publish environment
        # GitHub Actions does NOT fail-closed on an unconfigured environment:
        # referencing `environment: npm-publish` against a missing env block
        # silently auto-creates it with no protection rules. This step
        # queries the environment via the API and refuses to proceed if
        # no `required_reviewers` rule is configured. The publish job
        # below `needs:` this job, so a failure here prevents NPM_TOKEN
        # from ever being injected into a runner. See
        # docs/security/SUPPLY_CHAIN_HARDENING.md §C for the maintainer
        # setup runbook this depends on.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! ENV_CONFIG=$(gh api "repos/${GH_REPO}/environments/npm-publish" 2>&1); then
            echo "::error title=npm-publish environment missing::Configure the npm-publish Environment with required reviewers + a wait timer before this workflow can publish. See docs/security/SUPPLY_CHAIN_HARDENING.md §C."
            echo "API response: ${ENV_CONFIG}"
            exit 1
          fi

          REVIEWER_COUNT=$(echo "${ENV_CONFIG}" \
            | jq '[.protection_rules[]? | select(.type == "required_reviewers") | .reviewers // []] | flatten | length' \
            || echo 0)
          if [ "${REVIEWER_COUNT:-0}" -lt 1 ]; then
            echo "::error title=npm-publish environment unprotected::Environment exists but has zero required reviewers. NPM_TOKEN would publish without human review. Add at least one required reviewer in repo Settings → Environments → npm-publish."
            exit 1
          fi

          # prevent_self_review on the required_reviewers rule. Without
          # this, the same maintainer who merged a malicious change can
          # approve `npm-publish` themselves and immediately unlock
          # NPM_TOKEN, which defeats the separation-of-duties control
          # this preflight is supposed to enforce. The GitHub API exposes
          # this as `.prevent_self_review` on the `required_reviewers`
          # protection rule. We fail-closed unless it's explicitly true.
          PREVENT_SELF_REVIEW=$(echo "${ENV_CONFIG}" \
            | jq -r '[.protection_rules[]? | select(.type == "required_reviewers") | .prevent_self_review] | first // false' \
            || echo false)
          if [ "${PREVENT_SELF_REVIEW}" != "true" ]; then
            echo "::error title=npm-publish self-review not blocked::Environment has reviewers but \`prevent_self_review\` is disabled. The maintainer who merged the change can approve their own npm-publish gate and unlock NPM_TOKEN, defeating the separation-of-duties control. Enable 'Prevent self-review' under the required-reviewers rule in repo Settings → Environments → npm-publish."
            exit 1
          fi

          # wait_timer protection rule. The hardening doc + the error message
          # above both say a wait timer is mandatory, so enforce it here:
          # without one, a reviewer who clicks "Approve" by mistake has no
          # window to abort before NPM_TOKEN flows to the runner. Any
          # wait_timer > 0 satisfies the gate; 5 minutes is the documented
          # recommended minimum.
          WAIT_TIMER=$(echo "${ENV_CONFIG}" \
            | jq -r '[.protection_rules[]? | select(.type == "wait_timer") | .wait_timer] | first // 0' \
            || echo 0)
          if [ "${WAIT_TIMER:-0}" -lt 1 ]; then
            echo "::error title=npm-publish wait_timer missing::Environment has reviewers but no wait_timer protection rule. A reviewer who clicks 'Approve' by mistake would let NPM_TOKEN flow with no recourse. Add a wait_timer (5 minutes recommended) in repo Settings → Environments → npm-publish."
            exit 1
          fi

          # deployment_branch_policy: the environment must NOT allow "all
          # branches". Otherwise a feature branch could push a tag to it
          # and reuse the same NPM_TOKEN gate, bypassing branch protection.
          # The GitHub API shape for this rule is one of:
          #   * null                    — "all branches" (FAIL-CLOSED)
          #   * { protected_branches: true, custom_branch_policies: false }
          #     → "all protected branches" — acceptable: GitHub resolves
          #     the tag's target to `main` (a protected branch)
          #   * { protected_branches: false, custom_branch_policies: true }
          #     + a custom branch-name list at
          #     /environments/{name}/deployment-branch-policies that
          #     includes `main` (and optionally a `v*` tag pattern).
          #     We accept either form, but a `null` policy (all branches
          #     allowed) is rejected.
          DEPLOY_POLICY=$(echo "${ENV_CONFIG}" | jq -c '.deployment_branch_policy // null' || echo null)
          if [ "${DEPLOY_POLICY}" = "null" ]; then
            echo "::error title=npm-publish branch policy missing::Environment allows ANY branch to deploy to npm-publish. A feature branch with a malicious lifecycle script would inherit the same NPM_TOKEN gate as the release branch. Configure deployment branch policy to 'Protected branches only' OR add an explicit allow-list containing only the release branch in repo Settings → Environments → npm-publish → Deployment branches."
            exit 1
          fi

          PROTECTED_ONLY=$(echo "${DEPLOY_POLICY}" | jq -r '.protected_branches // false')
          CUSTOM_POLICIES=$(echo "${DEPLOY_POLICY}" | jq -r '.custom_branch_policies // false')

          if [ "${PROTECTED_ONLY}" = "true" ]; then
            echo "✓ npm-publish deployment branch policy: protected branches only"
          elif [ "${CUSTOM_POLICIES}" = "true" ]; then
            # Custom policies are stored in a sibling API path. We
            # require `main` in the allow-list (so the tag's target
            # branch passes). An optional `v*` tag pattern is also
            # accepted. Arbitrary wildcards (`release/*`, `*`) and
            # extra exact branches widen the surface — those are
            # rejected.
            RELEASE_BRANCH=main
            ALLOWED_TAG_PATTERN="v*"
            CUSTOM_BRANCHES=$(gh api "repos/${GH_REPO}/environments/npm-publish/deployment-branch-policies" --jq '[.branch_policies[]?.name]' 2>/dev/null || echo '[]')
            BRANCH_COUNT=$(echo "${CUSTOM_BRANCHES}" | jq 'length')
            HAS_RELEASE=$(echo "${CUSTOM_BRANCHES}" | jq --arg b "${RELEASE_BRANCH}" -r 'any(. == $b)')
            HAS_TAG_PATTERN=$(echo "${CUSTOM_BRANCHES}" | jq --arg t "${ALLOWED_TAG_PATTERN}" -r 'any(. == $t)')
            HAS_BAD_WILDCARD=$(echo "${CUSTOM_BRANCHES}" | jq --arg b "${RELEASE_BRANCH}" --arg t "${ALLOWED_TAG_PATTERN}" -r 'any(. != $b and . != $t and test("\\*"))')

            # Validate every entry is exactly `main` or `v*` — nothing else.
            # This catches `['main', 'staging']` (count=2 but staging is wrong)
            # and wildcards like `release/*`.
            if [ "${HAS_RELEASE}" != "true" ]; then
              echo "::error title=npm-publish custom branch policy excludes release branch::Environment uses custom branch policies but \`${RELEASE_BRANCH}\` is not in the allow-list. Add it in repo Settings → Environments → npm-publish → Deployment branches. Allowed: ${CUSTOM_BRANCHES}"
              exit 1
            fi
            UNEXPECTED=$(echo "${CUSTOM_BRANCHES}" | jq --arg b "${RELEASE_BRANCH}" --arg t "${ALLOWED_TAG_PATTERN}" -c 'map(select(. != $b and . != $t))')
            UNEXPECTED_COUNT=$(echo "${UNEXPECTED}" | jq 'length')
            if [ "${UNEXPECTED_COUNT}" -gt 0 ]; then
              echo "::error title=npm-publish custom branch policy has unexpected entries::Only \`${RELEASE_BRANCH}\` and \`${ALLOWED_TAG_PATTERN}\` are allowed. Remove: ${UNEXPECTED}"
              exit 1
            fi
            echo "✓ npm-publish deployment branch policy: custom allow-list ${CUSTOM_BRANCHES}"
          else
            echo "::error title=npm-publish branch policy invalid::deployment_branch_policy is set but neither protected_branches nor custom_branch_policies is true. The API shape is unexpected; refusing to publish. Raw policy: ${DEPLOY_POLICY}"
            exit 1
          fi

          echo "✓ npm-publish environment configured with ${REVIEWER_COUNT} required reviewer(s) (self-review blocked) + ${WAIT_TIMER}-min wait timer + scoped deployment branch policy"

      - name: Verify tag points to a commit on the release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG_SHA="${{ github.sha }}"
          RELEASE_BRANCH=main
          # Compare: if main is at or ahead of TAG_SHA, status is
          # "identical" or "ahead". If TAG_SHA is not reachable from
          # main at all, status is "diverged" or "behind".
          STATUS=$(gh api "repos/${GH_REPO}/compare/${RELEASE_BRANCH}...${TAG_SHA}" --jq '.status' 2>/dev/null || echo "error")
          if [ "${STATUS}" != "identical" ] && [ "${STATUS}" != "behind" ]; then
            echo "::error title=Tag not on release branch::Tag ${{ github.ref_name }} (${TAG_SHA}) is not reachable from \`${RELEASE_BRANCH}\`. Compare status: ${STATUS}. Push tags only on commits that are on \`${RELEASE_BRANCH}\`."
            exit 1
          fi
          echo "✓ Tag ${{ github.ref_name }} (${TAG_SHA}) is reachable from ${RELEASE_BRANCH} (status: ${STATUS})"

  # BUILD AND PACK — runs WITHOUT `environment: npm-publish`, so NPM_TOKEN
  # is NOT in scope. This is the job that executes arbitrary repository
  # and package-lifecycle code (prepack, prepare, build scripts) to
  # produce the tarballs we will publish. Because no publishing
  # credential is present, a compromised lifecycle hook (e.g. via a
  # malicious transitive dep that landed between two pushes) cannot
  # exfiltrate NPM_TOKEN — there is nothing to exfiltrate.
  #
  # Tarballs + a SHASUMS256.txt manifest are uploaded as a workflow
  # artifact and consumed by the `publish` job below.
  build-and-pack:
    name: Build and pack public packages (no secrets in scope)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify-environment
    permissions:
      contents: read
    outputs:
      npm_tag: ${{ steps.dist-tag.outputs.NPM_TAG }}
      artifact_name: ${{ steps.artifact.outputs.NAME }}
      # `node_version` is the single source of truth for Node version
      # in this workflow. `.nvmrc` lives in the repo, so we can only
      # resolve it in a job that checks out the source — the `publish`
      # job below intentionally does NOT check out (it has NPM_TOKEN
      # in scope and we want zero source code on disk there). Instead
      # we read `.nvmrc` here and pass the literal version downstream
      # via a job output, which the publish job feeds into
      # `actions/setup-node` as `node-version:` (literal, not a file
      # path). Without this, the publish job's setup-node step would
      # fail with "ENOENT: .nvmrc not found" — the merge blocker the
      # security reviewer flagged on d4f2353.
      node_version: ${{ steps.read-nvmrc.outputs.NODE_VERSION }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Read Node version from .nvmrc
        # Resolve `.nvmrc` here so the publish job (which has no
        # checkout) gets a literal version string and never needs the
        # source tree. The trim is intentional — `.nvmrc` files
        # commonly carry a trailing newline that setup-node tolerates
        # only sometimes; literal is safer.
        id: read-nvmrc
        run: |
          set -euo pipefail
          NODE_VERSION="$(tr -d '[:space:]' < .nvmrc)"
          if [ -z "${NODE_VERSION}" ]; then
            echo "::error::.nvmrc is empty after trim; cannot resolve Node version"
            exit 1
          fi
          echo "NODE_VERSION=${NODE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved Node version: ${NODE_VERSION}"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ steps.read-nvmrc.outputs.NODE_VERSION }}
          # Cache pnpm at the dependency-install layer is acceptable
          # here because NPM_TOKEN is not in scope. The publish job
          # disables the cache entirely so a poisoned restored
          # node_modules cannot influence the credential-bearing run.
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate npm metadata points to v10
        run: pnpm check:npm-metadata

      - name: Build all packages and Node UI bundle
        run: pnpm build

      # NOTE: tests are intentionally NOT re-run here. The main `ci.yml`
      # workflow runs the full test matrix on every push to `main` and is
      # the authoritative test gate (enforced via branch protection). By
      # the time a version tag is pushed, CI has already passed on `main`.
      # Re-running tests here would block the publish for known-red
      # sentinel tests. See .test-audit/BUGS_FOUND.md.

      - name: Validate git tag matches package.json versions
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          EXPECTED_VER="${TAG#v}"
          echo "Git tag: ${TAG} → expected npm version: ${EXPECTED_VER}"
          MISMATCHES=0
          node -e "
            const fs = require('fs');
            const path = require('path');
            const expected = '${EXPECTED_VER}';
            const pkgsDir = path.join(process.cwd(), 'packages');
            for (const dir of fs.readdirSync(pkgsDir)) {
              const pkgPath = path.join(pkgsDir, dir, 'package.json');
              if (!fs.existsSync(pkgPath)) continue;
              const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf-8'));
              if (pkg.private) continue;
              if (pkg.version !== expected) {
                console.error('MISMATCH: ' + pkg.name + '@' + pkg.version + ' (expected ' + expected + ')');
                process.exitCode = 1;
              } else {
                console.log('✓ ' + pkg.name + '@' + pkg.version);
              }
            }
          "

      - name: Derive npm dist-tag from git tag
        id: dist-tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          if [[ "$VER" == *-rc.* ]]; then
            NPM_TAG=rc
          elif [[ "$VER" == *-beta.* ]]; then
            NPM_TAG=beta
          elif [[ "$VER" == *-alpha.* ]]; then
            NPM_TAG=alpha
          elif [[ "$VER" == *-* ]]; then
            echo "::error title=Unrecognized prerelease::Version ${VER} has an unrecognized prerelease identifier. Only -rc.*, -beta.*, and -alpha.* are allowed. Refusing to publish to avoid accidentally tagging as 'latest'."
            exit 1
          else
            NPM_TAG=latest
          fi
          echo "NPM_TAG=${NPM_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved dist-tag: ${NPM_TAG} for ${TAG}"

      - name: Pack public packages into tarballs
        # `pnpm pack` runs the same prepack/prepare lifecycle hooks
        # `pnpm publish` would, but EMITS A TARBALL instead of pushing
        # to the registry. Because we then publish those tarballs
        # below via `npm publish <tarball> --ignore-scripts`, no
        # lifecycle hook ever runs with NPM_TOKEN in scope.
        #
        # We iterate workspaces explicitly (rather than rely on
        # `pnpm -r pack`) so we can capture each tarball's path
        # deterministically and emit the SHASUMS manifest below.
        # The output dir is `publish-artifacts/` at the repo root.
        run: |
          set -euo pipefail
          OUT_DIR="${GITHUB_WORKSPACE}/publish-artifacts"
          mkdir -p "${OUT_DIR}"
          PUBLIC_PKGS=$(node -e "
            const fs = require('fs');
            const path = require('path');
            const pkgsDir = path.join(process.cwd(), 'packages');
            const result = [];
            for (const dir of fs.readdirSync(pkgsDir)) {
              const pkgPath = path.join(pkgsDir, dir, 'package.json');
              if (!fs.existsSync(pkgPath)) continue;
              const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf-8'));
              if (pkg.private) continue;
              result.push(path.join(pkgsDir, dir));
            }
            process.stdout.write(result.join('\n'));
          ")
          if [ -z "${PUBLIC_PKGS}" ]; then
            echo "::error::No public packages found to pack"
            exit 1
          fi
          while IFS= read -r pkg_dir; do
            [ -n "${pkg_dir}" ] || continue
            echo "::group::pnpm pack ${pkg_dir}"
            ( cd "${pkg_dir}" && pnpm pack --pack-destination "${OUT_DIR}" )
            echo "::endgroup::"
          done <<< "${PUBLIC_PKGS}"
          ls -la "${OUT_DIR}"

      - name: Generate SHA-256 manifest for tarballs
        # `SHASUMS256.txt` is consumed by the publish job before each
        # `npm publish` call to confirm the tarball is the one this
        # job produced. A swap between artifact upload and download
        # (or a corrupted artifact) is caught here, not after the
        # registry already accepted the payload.
        run: |
          set -euo pipefail
          OUT_DIR="${GITHUB_WORKSPACE}/publish-artifacts"
          ( cd "${OUT_DIR}" && sha256sum -- *.tgz > SHASUMS256.txt )
          {
            echo '## Packed tarballs'
            echo ''
            echo '```'
            cat "${OUT_DIR}/SHASUMS256.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Determine artifact name
        id: artifact
        run: echo "NAME=npm-tarballs-${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload packed tarballs as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.artifact.outputs.NAME }}
          path: publish-artifacts/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish prebuilt tarballs to NPM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # `needs:` ensures the publish job DOES NOT START until
    # verify-environment confirms the npm-publish environment is
    # configured with required reviewers + branch policy AND
    # build-and-pack has produced and uploaded verified tarballs.
    # Combined with `environment:` below, this is what makes the gate
    # fail-closed: NPM_TOKEN is only injected into a runner whose
    # preflight already proved the environment is configured AND
    # whose payload is already built outside the credential boundary.
    needs:
      - verify-environment
      - build-and-pack
    # `npm-publish` Environment gates access to NPM_TOKEN. Configure required
    # reviewers + a wait timer in repo Settings → Environments → `npm-publish`
    # so a compromised tag push cannot auto-publish without human
    # approval. See docs/security/SUPPLY_CHAIN_HARDENING.md for the exact
    # setup steps. The environment value MUST match the Environment name
    # configured in repo Settings.
    environment: npm-publish
    permissions:
      contents: read
      # `id-token: write` is required to mint the GitHub Actions OIDC
      # token that `npm publish --provenance` exchanges for an npm
      # provenance attestation. The attestation records the workflow
      # run, repo, ref, and commit that produced each tarball, so any
      # consumer can independently verify a published version came
      # from this workflow (`npm view <pkg>@<ver> --json` includes
      # `dist.attestations.provenance.url`). Provenance does not
      # replace NPM_TOKEN authentication today, but it is the
      # mandatory precondition for migrating to npm Trusted Publishing
      # / OIDC (which removes the NPM_TOKEN dependency entirely).
      id-token: write

    steps:
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # Node version comes from `build-and-pack.outputs.node_version`,
          # which read it from `.nvmrc` in the checkout-bearing job.
          # We CANNOT use `node-version-file: .nvmrc` here because this
          # job intentionally has no `actions/checkout` (NPM_TOKEN is in
          # scope; we want zero source code on disk). The literal version
          # is the single value passed across the credential boundary.
          node-version: ${{ needs.build-and-pack.outputs.node_version }}
          registry-url: https://registry.npmjs.org
          # No `cache: pnpm` here. The publish job receives prebuilt
          # tarballs from `build-and-pack` and runs ONLY `npm publish`.
          # A poisoned cached `node_modules/` cannot influence the
          # credential-bearing job because no install runs.

      # `actions/checkout` is deliberately omitted on the publish job:
      # there is nothing for `npm publish <tarball>` to consume from
      # the source tree. Skipping the checkout means a malicious
      # patch landed in the same commit as a Dependabot-bumped
      # transitive dep cannot inject anything into the publish job's
      # working directory.

      - name: Download packed tarballs artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.build-and-pack.outputs.artifact_name }}
          path: publish-artifacts/

      - name: Verify SHA-256 manifest before publishing
        # Re-checksum the downloaded tarballs against the manifest
        # `build-and-pack` produced. A mismatch means either the
        # artifact upload/download corrupted the payload OR a
        # malicious actor with workflow-run-modify rights tampered
        # with the artifact between jobs. Either way we refuse to
        # publish — better an empty version on the registry than a
        # silently-swapped tarball.
        run: |
          set -euo pipefail
          cd publish-artifacts
          sha256sum --check SHASUMS256.txt

      - name: Publish each tarball with provenance
        # `npm publish <tarball> --ignore-scripts` is the smallest
        # publish primitive: it accepts a prebuilt tarball, contacts
        # the registry, and runs ZERO lifecycle scripts on the
        # tarball's contents. The combination of
        #   * `--ignore-scripts`           — no prepack/prepare/etc.
        #   * `--provenance`               — emits OIDC attestation
        #   * `--tag $NPM_TAG`             — dist-tag derived from the
        #                                    git tag (latest / rc / beta / alpha)
        #   * `--access public`            — public packages by default
        #   * environment-scoped NPM_TOKEN — limits credential lifetime
        #                                    to this job
        # is the minimum-privilege publish path. Loop is fail-fast
        # so the first publish failure aborts the rest instead of
        # leaving a partially-published version set on the registry.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ needs.build-and-pack.outputs.npm_tag }}
        run: |
          set -euo pipefail
          cd publish-artifacts
          shopt -s nullglob
          tarballs=(*.tgz)
          if [ "${#tarballs[@]}" -eq 0 ]; then
            echo "::error::No tarballs to publish — artifact was empty"
            exit 1
          fi
          echo "Publishing with dist-tag: ${NPM_TAG}"
          for tarball in "${tarballs[@]}"; do
            echo "::group::npm publish ${tarball}"
            npm publish "${tarball}" \
              --provenance \
              --access public \
              --tag "${NPM_TAG}" \
              --ignore-scripts
            echo "::endgroup::"
          done
