# zizmor configuration — workflow audit policy for this repo.
#
# We run zizmor in `auditor` persona at `--min-severity low` so the bar is
# deliberately strict. Anything we cannot fix at the moment must be either
# (a) listed here with a tracking note + remediation owner, OR (b) fixed.
# Don't silently bypass findings.
#
# Format: https://docs.zizmor.sh/configuration/

rules:
  # `artipacked` flags every `actions/checkout` step that does not pass
  # `persist-credentials: false`. The correct fix in principle is to set
  # it everywhere — but this repo currently carries submodule gitlinks in
  # the working tree (`experiments/agenthub-vs-dkg/agenthub` and
  # `…/autoresearch-mlx`) WITHOUT a corresponding `.gitmodules` file.
  #
  # With `persist-credentials: false`, actions/checkout's auth-cleanup
  # runs inside the MAIN action step (not in the post step). The cleanup
  # invokes `git submodule foreach --recursive`, which then fails with
  #   fatal: No url found for submodule path '…/agenthub' in .gitmodules
  # That fatal turns into a `##[error]` and kills every job on the run.
  #
  # On `main`, the cleanup runs in the POST step instead (because
  # persist-credentials defaults to true). actions/checkout demotes its
  # exit-128 there to `##[warning]` so main CI stays green — the bug is
  # latent there.
  #
  # Remediation plan (tracked in docs/security/SUPPLY_CHAIN_HARDENING.md):
  #   1. Either commit a correct `.gitmodules` or remove the orphan
  #      gitlinks in a follow-up source PR (out of scope for this audit-
  #      only PR per the no-source-changes constraint).
  #   2. Re-enable `persist-credentials: false` on every checkout.
  #   3. Delete this rules: artipacked block.
  #
  # Until then, suppress the rule globally so the audit gate accurately
  # reflects "everything that CAN be fixed today is fixed". Owner: repo
  # maintainers.
  artipacked:
    ignore:
      - ci.yml
      - codex-review.yml
      - evm-integration.yml
      - knip.yml
      - npm-continuous-publish.yml
      - release.yml
      - supply-chain-scan.yml
