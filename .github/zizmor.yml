# zizmor configuration — workflow audit policy for this repo.
#
# We run zizmor in `auditor` persona at `--min-severity low` so the bar is
# deliberately strict. Anything we cannot fix at the moment must be either
# (a) listed here with a tracking note + remediation owner, OR (b) fixed.
# Don't silently bypass findings.
#
# Format: https://docs.zizmor.sh/configuration/

rules:
  # `forbidden-uses` is opt-in. We use it as a permanent denylist for the
  # known-compromised actions involved in real-world supply-chain attacks.
  # Even if a future PR (or a future maintainer who isn't familiar with the
  # TeamPCP / Reviewdog incidents) tries to add one of these, the audit
  # gate will block it before merge.
  #
  # Don't remove entries from this list without a security review. Adding
  # entries is encouraged — every public attribution should be reflected
  # here. The cost is zero (the audit runs in milliseconds); the upside is
  # a hard merge gate against known-bad artifacts.
  forbidden-uses:
    config:
      deny:
        # TeamPCP campaign — March 2026, CVE-2026-33634. Tag-poisoned to
        # exfiltrate credentials.
        - aquasecurity/trivy-action
        - aquasecurity/setup-trivy
        - Checkmarx/kics-github-action
        - Checkmarx/ast-github-action
        # Reviewdog ecosystem compromise — January 2026.
        - reviewdog/action-setup
        - reviewdog/action-shellcheck
        - reviewdog/action-actionlint
        # tj-actions/changed-files — March 2025 supply-chain attack.
        - tj-actions/changed-files
        - tj-actions/branch-names
        - tj-actions/glob
        - tj-actions/verify-changed-files
        - tj-actions/changed-files-action

  # `dangerous-triggers` — scoped exception for the Dependabot advisory
  # gate.
  #
  # The advisory-gate workflow legitimately requires
  # `pull_request_target` so it can label, comment, request-changes,
  # and close a Dependabot PR — write operations are not available
  # under the plain `pull_request` event when the PR was authored by
  # `dependabot[bot]` (GitHub downgrades the `GITHUB_TOKEN` to
  # read-only for Dependabot-authored runs). The common
  # `pull_request_target` exploit class (privileged token executing
  # PR-controlled code) does not apply to this workflow because:
  #
  #   1. There is NO `actions/checkout` step — the PR's code is
  #      never fetched onto the runner.
  #   2. The only PR-side input read is the Dependabot commit-message
  #      metadata via `dependabot/fetch-metadata@<sha>` (SHA-pinned);
  #      that metadata is signed by GitHub's Dependabot integration,
  #      not by an arbitrary PR author.
  #   3. The job is fenced behind a three-clause check on the PR
  #      author identity (login + numeric id + user type), all read
  #      from the immutable PR object — so a non-Dependabot actor
  #      cannot reach the privileged steps in the first place.
  #   4. Every `${{ ... }}` value that flows into a `run:` block is
  #      routed via `env:` to close the template-injection class.
  #
  # Any future workflow that wants `pull_request_target` for a
  # different reason must add its own scoped exception here with an
  # equivalent justification — never widen this rule to a blanket
  # skip.
  dangerous-triggers:
    ignore:
      - dependabot-advisory.yml

  # `artipacked` (deliberate non-suppression — historical note).
  #
  # Earlier revisions of this PR carried a global `artipacked: ignore:`
  # block because the repo had six orphan submodule gitlinks in
  # `experiments/agenthub-vs-dkg/` without a corresponding `.gitmodules`
  # file. With `persist-credentials: false`, `actions/checkout`'s
  # auth-cleanup ran in the MAIN action step and invoked
  # `git submodule foreach --recursive`, which then failed with
  #   fatal: No url found for submodule path '…/agenthub' in .gitmodules
  # That fatal turned into a `##[error]` and killed every job on the
  # run — so the workaround was to drop `persist-credentials: false`
  # and silence the `artipacked` finding to keep the audit gate honest
  # about what was actually enforced.
  #
  # This is now fixed at the source: the six orphan gitlinks were
  # removed from the index in the same commit as this comment, and
  # `persist-credentials: false` is restored on every `actions/checkout`
  # call site. There is no longer any suppression of `artipacked` — if
  # a future PR adds a checkout without that flag, zizmor will block it
  # at the gate.
